<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élelmiszerbolt - Teljes CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .main-content { margin-top: 30px; min-height: 80vh; }
        .card { border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .table-container { background: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<header class="bg-dark py-4 shadow">
    <div class="container text-center">
        <h1 class="text-white display-5 fw-bold">Árucikk Kezelő Fetch Api Menűvel</h1>
    </div>
</header>

<div class="container main-content">
    <div class="card p-4 mb-5">
        <h4 id="form-title" class="mb-3 text-secondary">Új termék felvétele</h4>
        
        <input type="hidden" id="aru_kod_hidden">

        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Termék neve</label>
                <input type="text" id="nev" class="form-control" placeholder="pl. Trapista sajt">
            </div>
            <div class="col-md-3">
                <label class="form-label">Egység</label>
                <input type="text" id="egyseg" class="form-control" placeholder="pl. kg, doboz">
            </div>
            <div class="col-md-2">
                <label class="form-label">Ár (Ft)</label>
                <input type="number" id="ar" class="form-control" placeholder="0">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button onclick="hozzaad()" id="form-submit-btn" class="btn btn-success w-100">Hozzáadás</button>
            </div>
        </div>
    </div>

    <div class="table-container shadow-sm">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Megnevezés</th>
                    <th>Egység</th>
                    <th>Ár</th>
                    <th class="text-center">Műveletek</th>
                </tr>
            </thead>
            <tbody id="termek-lista">
                </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'backend.php';

    // 1. LISTÁZÁS (READ)
    function betolt() {
        fetch(API_URL + '?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(item => {
                    html += `
                        <tr>
                            <td><strong>#${item.aru_kod}</strong></td>
                            <td>${item.nev}</td>
                            <td><span class="badge bg-info text-dark">${item.egyseg}</span></td>
                            <td>${item.ar} Ft</td>
                            <td class="text-center">
                                <button onclick="szerkeszt(${item.aru_kod}, '${item.nev}', '${item.egyseg}', ${item.ar})" class="btn btn-warning btn-sm me-2">Szerkeszt</button>
                                <button onclick="torol(${item.aru_kod})" class="btn btn-danger btn-sm">Törlés</button>
                            </td>
                        </tr>`;
                });
                document.getElementById('termek-lista').innerHTML = html;
            })
            .catch(err => console.error("Hiba:", err));
    }

    // 2. HOZZÁADÁS (CREATE)
    function hozzaad() {
        const adatok = {
            nev: document.getElementById('nev').value,
            egyseg: document.getElementById('egyseg').value,
            ar: document.getElementById('ar').value
        };

        if(!adatok.nev || !adatok.ar) {
            alert("Név és Ár megadása kötelező!");
            return;
        }

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(adatok)
        })
        .then(() => {
            mezokUrítése();
            betolt();
        });
    }

    // 3. SZERKESZTÉS INDÍTÁSA (Adatok betöltése az űrlapba)
    function szerkeszt(id, nev, egyseg, ar) {
        document.getElementById('aru_kod_hidden').value = id;
        document.getElementById('nev').value = nev;
        document.getElementById('egyseg').value = egyseg;
        document.getElementById('ar').value = ar;
        
        document.getElementById('form-title').innerText = "Termék módosítása (ID: #" + id + ")";
        
        const gomb = document.getElementById('form-submit-btn');
        gomb.innerText = "Módosítás";
        gomb.className = "btn btn-primary w-100";
        gomb.onclick = modosit;

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 4. MÓDOSÍTÁS MENTÉSE (UPDATE - PUT)
    function modosit() {
        const adatok = {
            aru_kod: document.getElementById('aru_kod_hidden').value,
            nev: document.getElementById('nev').value,
            egyseg: document.getElementById('egyseg').value,
            ar: document.getElementById('ar').value
        };

        fetch(API_URL, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(adatok)
        })
        .then(res => res.json())
        .then(() => {
            mezokUrítése();
            betolt();
            
            // Visszaállítjuk a gombot eredeti állapotba
            const gomb = document.getElementById('form-submit-btn');
            gomb.innerText = "Hozzáadás";
            gomb.className = "btn btn-success w-100";
            gomb.onclick = hozzaad;
            document.getElementById('form-title').innerText = "Új termék felvétele";
        });
    }

    // 5. TÖRLÉS (DELETE)
    function torol(id) {
        if(confirm('Biztosan törlöd ezt a terméket?')) {
            fetch(API_URL + '?aru_kod=' + id, { method: 'DELETE' })
                .then(() => betolt());
        }
    }

    function mezokUrítése() {
        document.getElementById('aru_kod_hidden').value = '';
        document.getElementById('nev').value = '';
        document.getElementById('egyseg').value = '';
        document.getElementById('ar').value = '';
    }

    // Első betöltés
    betolt();
</script>

</body>
</html>
