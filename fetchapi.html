<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Élelmiszerbolt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .main-content { margin-top: 30px; }
        .card { border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">⬅ Vissza a főoldalra</a>
    </div>
</nav>

<div class="container main-content">
    <div class="card p-4 mb-4">
        <h4 id="form-title">Új termék felvétele</h4>
        <input type="hidden" id="aru_kod_hidden"> <div class="row g-3">
            <div class="col-md-4">
                <input type="text" id="nev" class="form-control" placeholder="Termék neve">
            </div>
            <div class="col-md-2">
                <input type="text" id="egyseg" class="form-control" placeholder="Egység (pl. kg)">
            </div>
            <div class="col-md-2">
                <input type="number" id="ar" class="form-control" placeholder="Ár (Ft)">
            </div>
            <div class="col-md-4">
                <button onclick="hozzaad()" id="form-submit-btn" class="btn btn-success w-100 text-nowrap">Hozzáadás</button>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Név</th>
                    <th>Egység</th>
                    <th>Ár</th>
                    <th class="text-center">Műveletek</th>
                </tr>
            </thead>
            <tbody id="termek-lista"></tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'backend.php';

    // ADATOK BETÖLTÉSE
    function betolt() {
        fetch(API_URL + '?t=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                let html = '';
                data.forEach(item => {
                    html += `<tr>
                        <td>#${item.aru_kod}</td>
                        <td>${item.nev}</td>
                        <td>${item.egyseg}</td>
                        <td>${item.ar} Ft</td>
                        <td class="text-center">
                            <button onclick="szerkeszt_form(${item.aru_kod}, '${item.nev}', '${item.egyseg}', ${item.ar})" class="btn btn-warning btn-sm">Szerkeszt</button>
                            <button onclick="torol(${item.aru_kod})" class="btn btn-danger btn-sm">Törlés</button>
                        </td>
                    </tr>`;
                });
                document.getElementById('termek-lista').innerHTML = html;
            });
    }

    // HOZZÁADÁS
    function hozzaad() {
        const adatok = {
            nev: document.getElementById('nev').value,
            egyseg: document.getElementById('egyseg').value,
            ar: document.getElementById('ar').value
        };
        fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(adatok)
        }).then(() => { urit(); betolt(); });
    }

    // SZERKESZTÉS MÓD BEKAPCSOLÁSA
    function szerkeszt_form(id, nev, egyseg, ar) {
        document.getElementById('aru_kod_hidden').value = id;
        document.getElementById('nev').value = nev;
        document.getElementById('egyseg').value = egyseg;
        document.getElementById('ar').value = ar;
        
        const gomb = document.getElementById('form-submit-btn');
        gomb.innerText = "Módosítás mentése";
        gomb.className = "btn btn-primary w-100 text-nowrap";
        gomb.onclick = ment_modositas;
        document.getElementById('form-title').innerText = "Termék módosítása (#" + id + ")";
    }

    // MÓDOSÍTÁS MENTÉSE (PUT)
    function ment_modositas() {
        const adatok = {
            aru_kod: document.getElementById('aru_kod_hidden').value,
            nev: document.getElementById('nev').value,
            egyseg: document.getElementById('egyseg').value,
            ar: document.getElementById('ar').value
        };
        fetch(API_URL, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(adatok)
        }).then(() => {
            const gomb = document.getElementById('form-submit-btn');
            gomb.innerText = "Hozzáadás";
            gomb.className = "btn btn-success w-100";
            gomb.onclick = hozzaad;
            document.getElementById('form-title').innerText = "Új termék felvétele";
            urit();
            betolt();
        });
    }

    // TÖRLÉS
    function torol(id) {
        if(confirm('Töröljük?')) {
            fetch(API_URL + '?aru_kod=' + id, { method: 'DELETE' }).then(() => betolt());
        }
    }

    function urit() {
        document.getElementById('nev').value = '';
        document.getElementById('egyseg').value = '';
        document.getElementById('ar').value = '';
        document.getElementById('aru_kod_hidden').value = '';
    }

    betolt();
</script>
</body>
</html>
