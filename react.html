<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web programozás-1 - React CRUD</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="bg-dark py-4 shadow">
        <div class="container text-center">
            <h1 class="text-white display-5 fw-bold">Web programozás-1 Előadás Házi feladat</h1>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom sticky-top">
        <div class="container">
            <div class="navbar-nav w-100 justify-content-start">
                <a class="nav-link" href="index.html">Főoldal</a>
                <a class="nav-link" href="javascript.html">JavaScript menü</a>
                <a class="nav-link active fw-bold" href="react.html">React menü</a>
                <a class="nav-link" href="react/dist/spa.html">SPA menü</a>
                <a class="nav-link" href="fetchapi.html">Fetch API menü</a>
                <a class="nav-link" href="axios.html">Axios menü</a>
                <a class="nav-link" href="oojs.html">OOJS menü</a>
            </div>
        </div>
    </nav>

     <h2 class="text-center mb-4">Árucikkek Nyilvántartása</h2>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [termekek, setTermekek] = useState([]);
            const [form, setForm] = useState({ id: null, nev: '', egyseg: '', ar: '' });
            const API_URL = 'backend.php';

            // Adatok betöltése
            const betolt = () => {
                fetch(API_URL + '?t=' + new Date().getTime())
                    .then(res => res.json())
                    .then(data => setTermekek(data));
            };

            useEffect(() => { betolt(); }, []);

            // Mentés
            const handleSave = (e) => {
                e.preventDefault();
                const method = form.id ? 'PUT' : 'POST';
                const body = form.id ? { aru_kod: form.id, ...form } : form;

                fetch(API_URL, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                }).then(() => {
                    setForm({ id: null, nev: '', egyseg: '', ar: '' });
                    betolt();
                });
            };

            // Törlés
            const torol = (id) => {
                if(confirm("Biztosan törlöd?")) {
                    fetch(`${API_URL}?aru_kod=${id}`, { method: 'DELETE' }).then(() => betolt());
                }
            };

            return (
                <div className="container mb-5">
                    {/* ŰRLAP KÁRTYA */}
                    <div className="card p-4 mb-4">
                        <h4 className="fw-bold mb-3 text-primary">
                            {form.id ? 'Termék szerkesztése' : 'Új termék felvétele'}
                        </h4>
                        <form onSubmit={handleSave} className="row g-3">
                            <div className="col-md-4">
                                <label className="small fw-bold">Név</label>
                                <input type="text" className="form-control" placeholder="Termék neve" value={form.nev} 
                                    onChange={e => setForm({...form, nev: e.target.value})} required />
                            </div>
                            <div className="col-md-3">
                                <label className="small fw-bold">Egység</label>
                                <input type="text" className="form-control" placeholder="pl. kg" value={form.egyseg} 
                                    onChange={e => setForm({...form, egyseg: e.target.value})} />
                            </div>
                            <div className="col-md-3">
                                <label className="small fw-bold">Ár (Ft)</label>
                                <input type="number" className="form-control" placeholder="Ár" value={form.ar} 
                                    onChange={e => setForm({...form, ar: e.target.value})} required />
                            </div>
                            <div className="col-md-2 d-flex align-items-end">
                                <button type="submit" className={`btn w-100 fw-bold ${form.id ? 'btn-warning' : 'btn-primary'}`}>
                                    {form.id ? 'Módosítás' : 'Hozzáadás'}
                                </button>
                            </div>
                        </form>
                    </div>

                    {/* TÁBLÁZAT */}
                    <div className="table-responsive bg-white p-3 rounded shadow-sm">
                        <table className="table table-hover align-middle">
                            <thead className="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Név</th>
                                    <th>Egység</th>
                                    <th>Ár</th>
                                    <th className="text-center">Műveletek</th>
                                </tr>
                            </thead>
                            <tbody>
                                {termekek.map(t => (
                                    <tr key={t.aru_kod}>
                                        <td className="text-muted fw-bold">#{t.aru_kod}</td>
                                        <td className="fw-bold">{t.nev}</td>
                                        <td>{t.egyseg}</td>
                                        <td><span className="badge bg-light text-dark border fs-6">{t.ar} Ft</span></td>
                                        <td className="text-center">
                                            <button className="btn btn-warning btn-sm me-2 px-3 shadow-sm" 
                                                onClick={() => setForm({ id: t.aru_kod, nev: t.nev, egyseg: t.egyseg, ar: t.ar })}>Szerkeszt</button>
                                            <button className="btn btn-danger btn-sm px-3 shadow-sm" onClick={() => torol(t.aru_kod)}>Törlés</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <footer class="text-center py-4 bg-white border-top">
      <div class="container">
        <p class="mb-1 text-muted small" style="font-size: 0.85rem; opacity: 0.8;">Készítette:</p>
        <p class="mb-0 small" style="font-size: 0.9rem;">
          <strong>Tok Balázs</strong> (OAJWPH) , 
          <strong>Pap Gergely</strong> (GVY7TX)
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
