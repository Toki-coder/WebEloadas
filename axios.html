<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web programozás-1 - React + Axios</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="bg-dark py-4 shadow">
        <div class="container text-center">
            <h1 class="text-white display-5 fw-bold">Web programozás-1 Előadás Házi feladat</h1>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom sticky-top">
        <div class="container">
            <div class="navbar-nav w-100 justify-content-start">
                <a class="nav-link" href="index.html">Főoldal</a>
                <a class="nav-link" href="javascript.html">JavaScript menü</a>
                <a class="nav-link" href="react.html">React menü</a>
                <a class="nav-link" href="react/dist/spa.html">SPA menü</a>
                <a class="nav-link" href="fetchapi.html">Fetch API menü</a>
                <a class="nav-link active fw-bold" href="axios.html">Axios menü</a>
                <a class="nav-link" href="oojs.html">OOJS menü</a>
            </div>
        </div>
    </nav>

     <h2 class="text-center mb-4">Árucikkek Nyilvántartása</h2>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [users, setUsers] = useState([]); 
            const [name, setName] = useState(""); 
            const [email, setEmail] = useState(""); 
            const [ar, setAr] = useState(""); 
            const [editId, setEditId] = useState(null);

            const API_URL = "backend.php";

            useEffect(() => {
                fetchUsers();
            }, []);

            const fetchUsers = async () => {
                const res = await axios.get(API_URL);
                setUsers(res.data); 
            };

            const submit = async () => {
                if (!name || !ar) { alert("Név és ár kötelező!"); return; }

                if (editId) {
                    await axios.put(API_URL, { aru_kod: editId, nev: name, egyseg: email, ar: ar });
                    setEditId(null);
                } else {
                    await axios.post(API_URL, { nev: name, egyseg: email, ar: ar });
                }
                
                setName("");
                setEmail("");
                setAr("");
                fetchUsers();  
            };

            const editUser = (user) => {
                setEditId(user.aru_kod);
                setName(user.nev);
                setEmail(user.egyseg);
                setAr(user.ar);
            };

            const deleteUser = async (id) => {
                if (!confirm("Biztosan törlöd ezt a terméket?")) return;
                await axios.delete(`${API_URL}?aru_kod=${id}`);
                fetchUsers();
            };

            return (
                <div className="container mb-5">
                    {/* ŰRLAP KÁRTYA */}
                    <div className="card p-4 mb-4 bg-light shadow-sm">
                        <h4 className="fw-bold mb-3 text-primary">
                            {editId ? "Termék módosítása" : "Új termék hozzáadása"}
                        </h4>
                        <div className="row g-3">
                            <div className="col-md-4">
                                <label className="small fw-bold">Termék neve</label>
                                <input className="form-control" value={name} onChange={(e) => setName(e.target.value)} placeholder="Név"/>
                            </div>
                            <div className="col-md-3">
                                <label className="small fw-bold">Egység</label>
                                <input className="form-control" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="pl. liter"/>
                            </div>
                            <div className="col-md-3">
                                <label className="small fw-bold">Ár (Ft)</label>
                                <input className="form-control" type="number" value={ar} onChange={(e) => setAr(e.target.value)} placeholder="0"/>
                            </div>
                            <div className="col-md-2 d-flex align-items-end">
                                <button className={`btn w-100 fw-bold ${editId ? "btn-warning" : "btn-primary"}`} onClick={submit}> 
                                    {editId ? "Módosítás" : "Hozzáadás"}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* TÁBLÁZAT */}
                    <div className="table-responsive bg-white p-3 rounded shadow-sm">
                        <table className="table table-hover align-middle">
                            <thead className="table-dark">
                                <tr>
                                    <th>Id</th>
                                    <th>Név</th>
                                    <th>Egység</th>
                                    <th>Ár</th>
                                    <th className="text-center">Műveletek</th>
                                </tr>
                            </thead>
                            <tbody>
                                {users.map((user) => (
                                    <tr key={user.aru_kod}>
                                        <td className="text-muted fw-bold">#{user.aru_kod}</td>
                                        <td className="fw-bold">{user.nev}</td>
                                        <td>{user.egyseg}</td>
                                        <td><span className="badge bg-light text-dark border fs-6">{user.ar} Ft</span></td>
                                        <td className="text-center">
                                            <button className="btn btn-warning btn-sm me-2 px-3 shadow-sm" onClick={() => editUser(user)}>Szerkeszt</button>
                                            <button className="btn btn-danger btn-sm px-3 shadow-sm" onClick={() => deleteUser(user.aru_kod)}>Törlés</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <footer class="text-center py-4 bg-white border-top">
      <div class="container">
        <p class="mb-1 text-muted small" style="font-size: 0.85rem; opacity: 0.8;">Készítette:</p>
        <p class="mb-0 small" style="font-size: 0.9rem;">
          <strong>Tok Balázs</strong> (OAJWPH) , 
          <strong>Pap Gergely</strong> (GVY7TX)
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
