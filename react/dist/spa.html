<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React SPA</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-bottom: 50px; }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; }
        .game-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 8px; justify-content: center; }
        .square { width: 80px; height: 80px; font-size: 2rem; display: flex; align-items: center; justify-content: center; }
        .nav-link { cursor: pointer; }
    </style>
</head>
<body>
    <header class="bg-dark py-4 shadow">
        <div class="container text-center">
            <h1 class="text-white display-5 fw-bold">Web programozás-1 Előadás Házi feladat</h1>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom sticky-top">
        <div class="container">
            <div class="navbar-nav w-100 justify-content-start">
                <a class="nav-link" href="../../index.html">Főoldal</a>
                <a class="nav-link" href="../../javascript.html">JavaScript menü</a>
                <a class="nav-link" href="../../react.html">React menü</a>
                <a class="nav-link active fw-bold" href="spa.html">SPA menü</a>
                <a class="nav-link" href="../../fetchapi.html">Fetch API menü</a>
                <a class="nav-link" href="../../axios.html">Axios menü</a>
                <a class="nav-link" href="../../oojs.html">OOJS menü</a>
            </div>
        </div>
    </nav>

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 1. KOMPONENS: SZÁMOLÓGÉP ---
        function Calculator() {
            const [display, setDisplay] = useState("");
            const handleClick = (val) => setDisplay(display + val);
            const calculate = () => {
                try { setDisplay(eval(display).toString()); } 
                catch { setDisplay("Hiba"); }
            };
            return (
                <div className="card p-4 shadow-sm text-center border-0">
                    <h3 className="mb-4 fw-bold text-primary">Számológép</h3>
                    <div className="bg-dark text-white p-3 mb-3 text-end fs-2 rounded shadow-inner" style={{minHeight: "75px", fontFamily: 'monospace'}}>
                        {display || "0"}
                    </div>
                    <div className="calc-grid">
                        {["7","8","9","/" , "4","5","6","*" , "1","2","3","-" , "0",".","=","+"].map(btn => (
                            <button key={btn} className="btn btn-outline-secondary py-3 fw-bold" 
                                onClick={() => btn === "=" ? calculate() : handleClick(btn)}>{btn}</button>
                        ))}
                        <button className="btn btn-danger mt-2 fw-bold" style={{gridColumn: "span 4"}} onClick={() => setDisplay("")}>Törlés</button>
                    </div>
                </div>
            );
        }

        // --- 2. KOMPONENS: ÉLELMISZER AMŐBA ---
        function TicTacToe() {
            const [squares, setSquares] = useState(Array(9).fill(null));
            const [isXNext, setIsXNext] = useState(true);

            const calculateWinner = (sqs) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a,b,c] of lines) {
                    if (sqs[a] && sqs[a] === sqs[b] && sqs[a] === sqs[c]) return sqs[a];
                }
                return null;
            };

            const handleClick = (i) => {
                if (calculateWinner(squares) || squares[i]) return;
                const nextSquares = squares.slice();
                nextSquares[i] = isXNext ? "🍞" : "🍎";
                setSquares(nextSquares);
                setIsXNext(!isXNext);
            };

            const winner = calculateWinner(squares);
            const status = winner ? `Győztes: ${winner}` : `Következő: ${isXNext ? "🍞" : "🍎"}`;

            return (
                <div className="card p-4 shadow-sm text-center border-0">
                    <h3 className="mb-4 fw-bold text-success">Élelmiszer Amőba</h3>
                    <div className={`alert ${winner ? 'alert-success' : 'alert-info'} fw-bold`}>{status}</div>
                    <div className="game-grid">
                        {squares.map((sq, i) => (
                            <button key={i} className="btn btn-light border square shadow-sm" onClick={() => handleClick(i)}>{sq}</button>
                        ))}
                    </div>
                    <button className="btn btn-outline-primary mt-4 fw-bold" onClick={() => setSquares(Array(9).fill(null))}>Új játék indítása</button>
                </div>
            );
        }

        // --- FŐ SPA APP ---
        function App() {
            const [page, setPage] = useState("calc");

            return (
                <div>
                   
                    
                        <div className="container text-center">
                           
                            <p className="lead mt-2">Váltson az alkalmazások között az alábbi gombokkal!</p>
                        </div>
                    

                    <div className="container">
                        {/* JÁTÉKVÁLTÓ GOMBOK */}
                        <div className="d-flex justify-content-center gap-3 mb-5">
                            <button 
                                className={`btn px-4 py-2 fw-bold shadow-sm ${page === "calc" ? "btn-primary" : "btn-white bg-white"}`} 
                                onClick={() => setPage("calc")}>
                                📱 Számológép
                            </button>
                            <button 
                                className={`btn px-4 py-2 fw-bold shadow-sm ${page === "game" ? "btn-success" : "btn-white bg-white"}`} 
                                onClick={() => setPage("game")}>
                                🎮 Amőba
                            </button>
                        </div>

                        <div className="row justify-content-center">
                            <div className="col-md-6">
                                {page === "calc" ? <Calculator /> : <TicTacToe />}
                            </div>
                        </div>
                    </div>

                    {/* LÁBLÉC */}
                    <footer className="text-center py-4 bg-white border-top mt-5">
                        <div className="container">
                            <p class="mb-1 text-muted small" style={{fontSize: "0.85rem", opacity: "0.8"}}>Készítette:</p>
                            <p class="mb-0 small" style={{fontSize: "0.9rem"}}>
                                <strong>Tok Balázs</strong> (OAJWPH) , 
                                <strong>Pap Gergely</strong> (GVY7TX)
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
