<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>React SPA - Számológép és Amőba</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 50px; }
        .nav-link { cursor: pointer; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 300px; margin: 0 auto; }
        .game-grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content: center; }
        .square { width: 100px; height: 100px; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 1. KOMPONENS: SZÁMOLÓGÉP ---
        function Calculator() {
            const [display, setDisplay] = useState("");
            const handleClick = (val) => setDisplay(display + val);
            const calculate = () => {
                try { setDisplay(eval(display).toString()); } 
                catch { setDisplay("Hiba"); }
            };
            return (
                <div className="card p-4 shadow-sm text-center">
                    <h3 className="mb-4">Számológép</h3>
                    <div className="bg-dark text-white p-3 mb-3 text-end fs-2 rounded" style={{minHeight: "70px"}}>
                        {display || "0"}
                    </div>
                    <div className="calc-grid">
                        {["7","8","9","/" , "4","5","6","*" , "1","2","3","-" , "0",".","=","+"].map(btn => (
                            <button key={btn} className="btn btn-secondary py-3" 
                                onClick={() => btn === "=" ? calculate() : handleClick(btn)}>{btn}</button>
                        ))}
                        <button className="btn btn-danger" style={{gridColumn: "span 4"}} onClick={() => setDisplay("")}>Törlés</button>
                    </div>
                </div>
            );
        }

        // --- 2. KOMPONENS: ÉLELMISZER AMŐBA ---
        function TicTacToe() {
            const [squares, setSquares] = useState(Array(9).fill(null));
            const [isXNext, setIsXNext] = useState(true);

            const calculateWinner = (sqs) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a,b,c] of lines) {
                    if (sqs[a] && sqs[a] === sqs[b] && sqs[a] === sqs[c]) return sqs[a];
                }
                return null;
            };

            const handleClick = (i) => {
                if (calculateWinner(squares) || squares[i]) return;
                const nextSquares = squares.slice();
                nextSquares[i] = isXNext ? "🍞" : "🍎";
                setSquares(nextSquares);
                setIsXNext(!isXNext);
            };

            const winner = calculateWinner(squares);
            const status = winner ? `Győztes: ${winner}` : `Következő: ${isXNext ? "🍞" : "🍎"}`;

            return (
                <div className="card p-4 shadow-sm text-center">
                    <h3 className="mb-4">Élelmiszer Amőba</h3>
                    <h4 className="alert alert-info">{status}</h4>
                    <div className="game-grid">
                        {squares.map((sq, i) => (
                            <button key={i} className="btn btn-outline-primary square" onClick={() => handleClick(i)}>{sq}</button>
                        ))}
                    </div>
                    <button className="btn btn-primary mt-4" onClick={() => setSquares(Array(9).fill(null))}>Új játék</button>
                </div>
            );
        }

        // --- FŐ SPA APP ---
        function App() {
            const [page, setPage] = useState("calc");

            return (
                <div>
                    <nav className="navbar navbar-expand navbar-dark bg-dark mb-5 shadow">
                        <div className="container">
                            <span className="navbar-brand">React SPA Feladat</span>
                            <div className="navbar-nav">
                                <a className={`nav-link ${page === "calc" ? "active border-bottom" : ""}`} onClick={() => setPage("calc")}>Számológép</a>
                                <a className={`nav-link ${page === "game" ? "active border-bottom" : ""}`} onClick={() => setPage("game")}>Amőba Játék</a>
                            </div>
                        </div>
                    </nav>

                    <div className="container">
                        <div className="row justify-content-center">
                            <div className="col-md-8">
                                {page === "calc" ? <Calculator /> : <TicTacToe />}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
